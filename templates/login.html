<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            width: 350px;
            background: white;
            border: 1px solid #dbdbdb;
            padding: 40px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .register-link {
            margin-top: 20px;
        }

        .register-link a {
            text-decoration: none;
            color: #0095f6;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h1>Login</h1>

    <form method="POST">
        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">Log In</button>
    </form>

    <div class="register-link">
        Don't have an account?
        <a href="/register">Register</a>
    </div>
</div>

</body>
</html>
